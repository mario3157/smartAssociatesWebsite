server {
    listen 80;
    server_name _;

    # SmartAssociates page
    location /smartassociates {
        alias /var/www/html/smartassociates_final.html;
        default_type text/html;
    }

    # Root redirects to smartassociates
    location = / {
        return 301 /smartassociates;
    }

    # 404 fallback
    error_page 404 /404.html;
}
