<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Products — SMART Associates</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ── FOOD GRID STYLES (Matching Granite Section) ── */
    .food-section { padding: 4rem; background: #ffffff; }
    
    .food-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }

    .food-card {
      background: var(--off-white);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
      cursor: pointer;
    }

    .food-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(26,77,26,0.12);
      border-color: var(--green-mid);
    }

    .food-img-wrap {
      width: 100%; height: 250px;
      overflow: hidden; background: #eee;
      border-bottom: 1px solid var(--border);
    }

    .food-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .food-card:hover .food-img-wrap img { transform: scale(1.1); }

    .food-info { padding: 1.5rem; }
    .food-category { 
      font-size: 0.75rem; font-weight: 800; color: var(--gold-bright); 
      text-transform: uppercase; letter-spacing: 0.1em; 
    }
    .food-name { 
      font-family: 'Cormorant Garamond', serif; 
      font-size: 1.6rem; font-weight: 700; color: #000; margin: 0.3rem 0;
    }
    .food-desc { font-size: 0.95rem; color: #444; line-height: 1.5; }

    /* Lightbox for Food */
    #food-lightbox {
      position: fixed; inset: 0; background: rgba(255,255,255,0.98);
      z-index: 2000; display: none; align-items: center; justify-content: center;
      padding: 2rem;
    }
    #food-lightbox.open { display: flex; animation: fadeIn 0.3s ease; }
    .lightbox-content { max-width: 900px; width: 100%; text-align: center; }
    .lightbox-content img { max-height: 70vh; width: auto; border-radius: 4px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="section-hero" style="margin-top:72px" data-title="Quality">
    <a href="/index.html" class="back-btn">← Back to Home</a>
    <p class="section-label">Unit 02</p>
    <h2 class="section-title"><em>Premium</em><br>Food Products</h2>
    <p>Sourcing the finest agricultural produce and natural spices from verified Indian farmers.</p>
  </div>

  <div class="food-section">
    <div id="food-container" class="food-grid">
      </div>
  </div>

  <div id="food-lightbox" onclick="closeFoodLightbox()">
    <div class="lightbox-content">
      <img id="lb-food-img" src="" alt="">
      <h2 id="lb-food-name" class="section-title" style="font-size: 2rem; margin-top: 1.5rem;"></h2>
    </div>
  </div>

  <script>
    // 1. YOUR PRODUCT DATA (JSON format)
    // Add your image filenames here (ensure they are in /images/food/)
    const foodProducts = [
      {
        name: "Bajra",
        category: "Natural",
        desc: "Bajra",
        image: "Bajra.jpeg" 
      },
      {
        name: "Bayleaf",
        category: "Spices",
        desc: "Bayleaf",
        image: "Bayleaf.jpeg"
      },
      {
        name: "Black Gram",
        category: "Natural",
        desc: "Black Gram",
        image: "Black Gram.jpeg"
      },
      {
        name: "Cow Pea(Alasandalu)",
        category: "Natural",
        desc: "Cow Pea(Alasandalu)",
        image: "Cow Pea(Alasandalu).jpeg"
      },
      {
        name: "Little Millet (Samalu)",
        category: "Natural",
        desc: "Little Millet (Samalu)",
        image: "Little Millet (Samalu).jpeg"
      },
      {
        name: "Kidney Bean (Rajma)",
        category: "Natural",
        desc: "Kidney Bean (Rajma)",
        image: "Kidney Bean (Rajma).jpeg"
      },
      {
        name: "Pinto Bean",
        category: "Natural",
        desc: "Pinto Bean",
        image: "Pinto Bean.jpeg"
      },
      {
        name: "Quinoa",
        category: "Natural",
        desc: "Quinoa",
        image: "Quinoa.jpeg"
      }
    ];

    // 2. RENDER PRODUCTS
    const container = document.getElementById('food-container');
    
    foodProducts.forEach(product => {
      const card = document.createElement('div');
      card.className = 'food-card reveal';
      card.onclick = () => openFoodLightbox(product);
      
      card.innerHTML = `
        <div class="food-img-wrap">
          <img src="/images/food/${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/400x300?text=Product+Image'">
        </div>
        <div class="food-info">
          <span class="food-category">${product.category}</span>
          <h3 class="food-name">${product.name}</h3>
          <p class="food-desc">${product.desc}</p>
        </div>
      `;
      container.appendChild(card);
    });

    // 3. LIGHTBOX FUNCTIONS
    function openFoodLightbox(product) {
      document.getElementById('lb-food-img').src = `/images/food/${product.image}`;
      document.getElementById('lb-food-name').innerText = product.name;
      document.getElementById('food-lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeFoodLightbox() {
      document.getElementById('food-lightbox').classList.remove('open');
      document.body.style.overflow = 'auto';
    }
  </script>

  <script src="/main.js"></script>
</body>
</html>
