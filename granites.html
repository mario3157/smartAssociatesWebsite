<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Granites — SMART Associates</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .granite-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      padding: 4rem;
      background: #ffffff;
    }

    .granite-card {
      background: var(--off-white);
      border: 1.5px solid var(--border);
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), box-shadow 0.4s, border-color 0.3s;
      cursor: zoom-in;
      border-radius: 4px;
    }

    .granite-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px rgba(26,77,26,0.15);
      border-color: var(--green-mid);
    }

    .granite-img-wrap {
      width: 100%; height: 240px;
      background: var(--light-grey);
      overflow: hidden; position: relative;
    }

    .granite-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.16,1,0.3,1);
      filter: brightness(1.05) contrast(1.05);
    }

    .granite-card:hover .granite-img-wrap img { transform: scale(1.06); }

    .granite-img-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 55%, rgba(0,0,0,0.15) 100%);
    }

    .granite-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem; color: rgba(26,77,26,0.2);
    }

    .granite-info {
      padding: 1.5rem;
      border-top: 2px solid var(--border);
      background: #ffffff;
    }
    .granite-code {
      font-size: 0.75rem; letter-spacing: 0.4em; text-transform: uppercase;
      color: var(--green-mid); margin-bottom: 0.4rem; font-weight: 700;
    }
    .granite-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 700; color: #000000;
    }
    .granite-origin {
      font-size: 0.9rem; font-weight: 500; color: #555555; margin-top: 0.3rem;
    }

    .state-message {
      grid-column: 1 / -1; text-align: center; padding: 5rem 2rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 700; color: #333333;
    }
    .state-message span {
      display: block; font-family: 'Jost', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.2em; color: var(--green-mid);
      margin-top: 0.75rem; font-weight: 600;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 9999;
      align-items: center; justify-content: center;
      transition: background 0.35s ease; cursor: zoom-out;
    }
    .lightbox.open { display: flex; background: rgba(0,0,0,0.88); }

    .lightbox-inner {
      position: relative;
      max-width: 90vw; max-height: 90vh;
      display: flex; flex-direction: column; align-items: center;
      transform: scale(0.85); opacity: 0;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
    }
    .lightbox.open .lightbox-inner { transform: scale(1); opacity: 1; }

    .lightbox-img {
      max-width: 90vw; max-height: 78vh;
      object-fit: contain;
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      filter: brightness(1.05) contrast(1.05);
    }

    .lightbox-caption { margin-top: 1.5rem; text-align: center; }
    .lightbox-caption .granite-code { font-size: 0.8rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold-light); font-weight: 700; }
    .lightbox-caption .granite-name { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; color: #ffffff; margin-top: 0.3rem; }

    .lightbox-close {
      position: absolute; top: -3rem; right: 0;
      background: none; border: 2px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.7); font-size: 1.2rem;
      width: 2.5rem; height: 2.5rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; font-family: 'Jost', sans-serif;
    }
    .lightbox-close:hover { border-color: #fff; color: #fff; }

    .lightbox-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: 2px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.7); font-size: 1.4rem;
      width: 3rem; height: 3rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }
    .lightbox-nav:hover { border-color: #fff; color: #fff; }
    .lightbox-prev { left: -4.5rem; }
    .lightbox-next { right: -4.5rem; }

    /* Force white hero — override any inherited dark styles */
    body { background: #ffffff !important; color: #111111 !important; }
    body::before { display: none !important; }
    .section-hero {
      background: #ffffff !important;
      border-bottom: 2px solid #d8d4cc !important;
    }
    nav {
      background: #ffffff !important;
      border-bottom: 2px solid #d4a017 !important;
      backdrop-filter: none !important;
    }
    .nav-logo-text { color: #1a4d1a !important; }
    .nav-tabs li a { color: #111111 !important; }
    .nav-tabs li a:hover, .nav-tabs li a.active { color: #1a4d1a !important; }

    @media (max-width: 768px) {
      .granite-grid { padding: 1.5rem; }
      .lightbox-prev { left: -3rem; }
      .lightbox-next { right: -3rem; }
      .lightbox-nav { width: 2.4rem; height: 2.4rem; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="section-hero" style="margin-top:72px" data-title="Granite">
    <a href="/index.html" class="back-btn">← Back to Home</a>
    <p class="section-label">Unit 01</p>
    <h2 class="section-title"><em>Premium</em><br>Indian Granites</h2>
    <p>Sourced from the finest quarries across South India. Each piece is unique in pattern, colour, and character. Click any image to enlarge.</p>
  </div>

  <div class="granite-grid" id="granite-grid">
    <div class="state-message">Loading collection…<span>Please wait</span></div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <div class="lightbox-inner" id="lightbox-inner">
      <button class="lightbox-close" onclick="closeLightbox()">✕</button>
      <button class="lightbox-nav lightbox-prev" onclick="event.stopPropagation(); navigateLightbox(-1)">&#8592;</button>
      <button class="lightbox-nav lightbox-next" onclick="event.stopPropagation(); navigateLightbox(1)">&#8594;</button>
      <img class="lightbox-img" id="lightbox-img" src="" alt="">
      <div class="lightbox-caption">
        <div class="granite-code" id="lightbox-code"></div>
        <div class="granite-name" id="lightbox-name"></div>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2026 SMART Associates · Granites Unit</p>
    <div class="footer-logo">SA</div>
  </footer>

  <script src="/main.js"></script>
  <script>
    let graniteData = [];
    let currentIndex = 0;

    async function loadGranites() {
      const grid = document.getElementById('granite-grid');
      try {
        const res = await fetch('/granites.json?v=' + Date.now());
        if (!res.ok) throw new Error('Could not load granites.json');
        graniteData = await res.json();

        if (!graniteData.length) {
          grid.innerHTML = `<div class="state-message">Collection Coming Soon<span>Images are being prepared</span></div>`;
          return;
        }

        grid.innerHTML = graniteData.map((g, i) => `
          <div class="granite-card reveal" style="transition-delay:${i * 60}ms" onclick="openLightbox(${i})">
            <div class="granite-img-wrap">
              ${g.image
                ? `<img src="/images/granites/${g.image}" alt="${g.name}" loading="lazy"
                        onerror="this.parentElement.innerHTML='<div class=granite-placeholder>◈</div>'">`
                : `<div class="granite-placeholder">◈</div>`
              }
            </div>
            <div class="granite-info">
              <div class="granite-code">${g.code}</div>
              <div class="granite-name">${g.name}</div>
              ${g.origin ? `<div class="granite-origin">${g.origin}</div>` : ''}
            </div>
          </div>
        `).join('');

        initReveal();
      } catch (err) {
        grid.innerHTML = `<div class="state-message">Could not load granite collection<span>${err.message}</span></div>`;
      }
    }

    function openLightbox(index) {
      currentIndex = index;
      const g = graniteData[index];
      const lb = document.getElementById('lightbox');
      document.getElementById('lightbox-img').src = g.image ? `/images/granites/${g.image}` : '';
      document.getElementById('lightbox-img').alt = g.name;
      document.getElementById('lightbox-code').textContent = g.code;
      document.getElementById('lightbox-name').textContent = g.name;
      lb.style.display = 'flex';
      requestAnimationFrame(() => lb.classList.add('open'));
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox(event) {
      if (event && event.target !== document.getElementById('lightbox')) return;
      const lb = document.getElementById('lightbox');
      lb.classList.remove('open');
      setTimeout(() => { lb.style.display = 'none'; }, 350);
      document.body.style.overflow = '';
    }

    function navigateLightbox(dir) {
      currentIndex = (currentIndex + dir + graniteData.length) % graniteData.length;
      const g = graniteData[currentIndex];
      const img = document.getElementById('lightbox-img');
      img.style.opacity = '0';
      setTimeout(() => {
        img.src = g.image ? `/images/granites/${g.image}` : '';
        img.alt = g.name;
        document.getElementById('lightbox-code').textContent = g.code;
        document.getElementById('lightbox-name').textContent = g.name;
        img.style.opacity = '1';
      }, 200);
    }

    document.addEventListener('keydown', (e) => {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox({ target: lb });
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
      if (e.key === 'ArrowRight') navigateLightbox(1);
    });

    document.addEventListener('DOMContentLoaded', loadGranites);
  </script>
</body>
</html>
